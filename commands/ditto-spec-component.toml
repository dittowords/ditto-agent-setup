description = "Create or update a component's Ditto spec file and sync styleguide rules from the platform"
prompt = "Use the bundled ditto-spec-component skill: analyze the component {{args}}, identify its text surfaces and suggested tags (and child components lacking specs), present the proposed spec for approval, then create or update index.ditto.md via npx ditto-spec scaffold, and sync rules with npx ditto-spec pull followed by npx ditto-spec check."
